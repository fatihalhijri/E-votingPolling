# railway.toml — Konfigurasi Deployment Railway
#
# File ini menentukan perintah yang dijalankan saat deploy:
# - releaseCommand : dijalankan SEBELUM app start (migration database)
# - startCommand   : dijalankan untuk menjalankan app (override Procfile)
#
# Dokumentasi: https://docs.railway.com/reference/config-as-code

[deploy]

# releaseCommand dijalankan setiap kali ada deploy baru.
# Kenapa --force? Karena di production tidak ada prompt interaktif.
# Migration aman dijalankan berulang — hanya menjalankan yang belum ada.
releaseCommand = "php artisan migrate --force"

# Start command override — sama dengan Procfile tapi lebih eksplisit.
startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"

# healthcheckPath — Railway akan cek URL ini untuk memastikan app berjalan.
# Laravel merespons 200 di "/" (home page kita yang publik).
healthcheckPath = "/"
